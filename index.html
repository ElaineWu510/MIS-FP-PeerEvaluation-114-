<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIS Peer Evaluation · 114</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;600&family=Noto+Sans+TC:wght@400;600&display=swap');
:root{
  --red:#8B2635;--red-mid:#c94055;--red-light:#f5e8ea;
  --dark:#1a1a1a;--mid:#4a4a4a;--light:#f7f4f0;--border:#ddd8d0;
  --blue:#1a6ebd;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Noto Sans TC',sans-serif;background:var(--light);color:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{max-width:680px;width:100%;background:white;border-radius:18px;padding:44px 48px;box-shadow:0 12px 40px rgba(0,0,0,0.06);border:1px solid var(--border)}
.eyebrow{font-size:11px;letter-spacing:2px;color:#aaa;margin-bottom:10px}
h1{font-family:'DM Serif Display',serif;font-size:34px;color:var(--red);line-height:1.15;margin-bottom:6px}
.sub{font-size:14px;color:var(--mid);margin-bottom:28px}
.classes{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
.cls{border:1.5px solid var(--border);border-radius:12px;padding:22px;transition:all 0.15s;text-decoration:none;color:inherit;display:block}
.cls:hover{border-color:var(--red);transform:translateY(-2px);box-shadow:0 8px 24px rgba(139,38,53,0.1)}
.cls .tag{font-size:11px;letter-spacing:2px;color:var(--red);font-weight:700;margin-bottom:4px}
.cls .name{font-family:'DM Serif Display',serif;font-size:26px;color:var(--dark);margin-bottom:6px}
.cls .desc{font-size:12px;color:#888}
.links{font-size:12px;color:var(--mid);line-height:1.7;padding-top:20px;border-top:1px solid var(--border)}
.links a{color:var(--blue);text-decoration:none}
.links a:hover{text-decoration:underline}
.links code{background:#f5f2ee;padding:2px 6px;border-radius:4px;font-size:11px}
.footer{margin-top:24px;text-align:center;font-size:11px;color:#aaa}
@media(max-width:560px){
  .wrap{padding:28px 24px}
  .classes{grid-template-columns:1fr}
  h1{font-size:26px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">NDHU MIS · 114 學年度</div>
  <h1>Final Presentation<br>Peer Evaluation</h1>
  <p class="sub">資管系期末專題同儕互評系統。請依照授課老師提供的網址進入對應班級。</p>

  <div class="classes">
    <a class="cls" href="./msf/">
      <div class="tag">CLASS A</div>
      <div class="name">MSF</div>
      <div class="desc">點我進入 MSF 班同儕互評</div>
    </a>
    <a class="cls" href="./im/">
      <div class="tag">CLASS B</div>
      <div class="name">IM</div>
      <div class="desc">點我進入 IM 班同儕互評</div>
    </a>
  </div>

  <div class="links">
    <strong>老師專用入口</strong><br>
    MSF：<a href="./msf/teacher.html">評分表</a> · <a href="./msf/admin.html">後台管理</a><br>
    IM：<a href="./im/teacher.html">評分表</a> · <a href="./im/admin.html">後台管理</a>
  </div>

  <div class="footer">© 2026 NDHU Management Information Systems</div>
</div>
</body>
</html>
